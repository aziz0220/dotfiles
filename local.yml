---
- name: Primeagen-style local bootstrap entrypoint
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    user_home: "/home/{{ user_name }}"
    bootstrap_home_dir: "{{ playbook_dir }}/.bootstrap/home"

  vars_files:
    - vars/user-profile.yml
    - vars/system-locale.yml
    - vars/installed-packages.yml
    - vars/systemd-enabled-services.yml
    - vars/snap-list.yml
    - vars/groups.yml
    - vars/runtimes.yml
    - vars/npm-global.yml
    - vars/pipx.yml
    - vars/cargo.yml
    - vars/gem.yml
    - vars/flatpak.yml
    - vars/custom-tools.yml
    - vars/repos.yml

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        force_apt_get: true
        update_cache: true
        cache_valid_time: 3600
      tags:
        - install
        - core

    - name: Show bootstrap source
      ansible.builtin.debug:
        msg:
          - "Bootstrap home path: {{ bootstrap_home_dir }}"
          - "Target user: {{ user_name }}"

  tasks:
    - name: Include ssh setup tasks
      ansible.builtin.include_tasks: tasks/ssh.yml
      tags:
        - ssh
        - base
        - install

    - name: Include core setup tasks
      ansible.builtin.include_tasks: tasks/core-setup.yml
      tags:
        - core
        - base
        - install

    - name: Include dotfiles/home setup tasks
      ansible.builtin.include_tasks: tasks/dotfiles.yml
      tags:
        - dotfiles
        - home
        - base
        - install

    - name: Include node/runtime setup tasks
      ansible.builtin.include_tasks: tasks/node-setup.yml
      tags:
        - node
        - software
        - core
        - base
        - install
