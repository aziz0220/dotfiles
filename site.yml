---
- name: Recreate Ubuntu 22.04 WSL environment from recovery snapshot
  hosts: wsl
  become: true
  gather_facts: true

  vars:
    seed_root: "{{ playbook_dir }}/seed"
    user_home: "/home/{{ user_name }}"

  vars_files:
    - vars/user-profile.yml
    - vars/system-locale.yml
    - vars/installed-packages.yml
    - vars/systemd-enabled-services.yml
    - vars/snap-list.yml
    - vars/groups.yml
    - vars/runtimes.yml
    - vars/repos.yml

  pre_tasks:
    - name: Show restore source
      ansible.builtin.debug:
        msg:
          - "Recovery seed path: {{ seed_root }}"
          - "Target user: {{ user_name }}"

  roles:
    - role: system_setup
      tags: ["system", "base"]
    - role: app_stack
      tags: ["software", "base"]
    - role: home_restore
      tags: ["home", "base"]
