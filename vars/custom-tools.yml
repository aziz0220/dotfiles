custom_tools:
  - name: claude-code
    check_cmd: "command -v claude"
    install_cmd: "npm install -g @anthropic-ai/claude-code"
    become: false
  - name: opencode
    check_cmd: "command -v opencode"
    install_cmd: "npm install -g opencode-ai"
    become: false
  - name: junie
    check_cmd: "command -v junie"
    install_cmd: "curl -fsSL https://junie.jetbrains.com/install.sh | bash"
    become: false
  - name: copilot
    check_cmd: "gh copilot --version 2>/dev/null"
    install_cmd: "gh extension install github/gh-copilot"
    become: false
  - name: neovim
    check_cmd: "command -v nvim"
    install_cmd: "sudo apt-get install -y neovim"
    become: false
  - name: clangd
    check_cmd: "command -v clangd"
    install_cmd: "sudo apt-get install -y clangd-18 && sudo update-alternatives --install /usr/bin/clangd clangd /usr/bin/clangd-18 100"
    become: false
  - name: kind
    check_cmd: "command -v kind"
    install_cmd: |
      curl -Lo /tmp/kind "https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64" &&
      chmod +x /tmp/kind &&
      sudo mv /tmp/kind /usr/local/bin/kind
    become: true
  - name: docker
    check_cmd: "command -v docker"
    install_cmd: |
      curl -fsSL https://get.docker.com | sh &&
      sudo usermod -aG docker {{ user_name }}
    become: true
