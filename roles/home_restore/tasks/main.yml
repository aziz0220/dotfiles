---
- name: Compute user supplemental groups
  ansible.builtin.set_fact:
    _user_group_names: "{{ user_groups | map(attribute='name') | reject('equalto', user_name) | list }}"

- name: Ensure required groups exist
  ansible.builtin.group:
    name: "{{ item.name }}"
    gid: "{{ item.gid }}"
    state: present
  loop: "{{ user_groups }}"
  register: _group_results
  failed_when:
    - _group_results is failed
    - '"already exists" not in _group_results.msg | default("")'

- name: Ensure primary user group exists
  ansible.builtin.group:
    name: "{{ user_name }}"
    gid: "{{ user_gid }}"
    state: present

- name: Ensure primary user exists
  ansible.builtin.user:
    name: "{{ user_name }}"
    uid: "{{ user_uid }}"
    group: "{{ user_name }}"
    groups: "{{ _user_group_names }}"
    append: true
    shell: "{{ user_shell }}"
    create_home: true
    home: "{{ user_home }}"
    state: present

- name: Ensure home directory ownership
  ansible.builtin.file:
    path: "{{ user_home }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0755'
    state: directory

- name: Check bootstrap home source directory
  ansible.builtin.stat:
    path: "{{ bootstrap_home_dir }}"
  register: bootstrap_home_tree

- name: Fail when bootstrap home source is missing
  ansible.builtin.fail:
    msg: >-
      Missing bootstrap home source at {{ bootstrap_home_dir }}.
      Decrypt vault/home-secrets.tar.gz.aes256 first (SETUP_SECRETS_PASSWORD=... ./ansible-run)
      or create {{ bootstrap_home_dir }} before running.
  when: not bootstrap_home_tree.stat.exists

- name: Copy bootstrap home tree to target home
  ansible.builtin.command:
    argv:
      - rsync
      - -a
      - --itemize-changes
      - "--chown={{ user_name }}:{{ user_name }}"
      - --exclude=.nvm
      - --exclude=.cache
      - "{{ bootstrap_home_dir }}/"
      - "{{ user_home }}/"
  register: _home_restore_rsync
  changed_when: _home_restore_rsync.stdout | length > 0
  when: bootstrap_home_tree.stat.exists
  become: true

- name: Ensure user-local bin directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/bin"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Write portable user tool environment
  ansible.builtin.copy:
    dest: "{{ user_home }}/.local/bin/env"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
    content: |
      # Managed by Ansible. Source this file from shell startup.
      for user_bin_dir in \
        "$HOME/go/bin" \
        "$HOME/.npm-global/bin" \
        "$HOME/.cargo/bin" \
        "$HOME/.opencode/bin" \
        "$HOME/.local/bin"
      do
        case ":${PATH:-}:" in
          *":${user_bin_dir}:"*) ;;
          *) PATH="${user_bin_dir}${PATH:+:${PATH}}" ;;
        esac
      done
      export PATH
      unset user_bin_dir

- name: Load portable user tool environment from zsh
  ansible.builtin.blockinfile:
    path: "{{ user_home }}/.zshenv"
    create: true
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED USER TOOL ENVIRONMENT"
    block: |
      if [ -r "$HOME/.local/bin/env" ]; then
        . "$HOME/.local/bin/env"
      fi

- name: Restore SSH strict permissions
  ansible.builtin.stat:
    path: "{{ user_home }}/.ssh"
  register: bootstrap_ssh_dir

- name: Set SSH directory permissions
  ansible.builtin.file:
    path: "{{ user_home }}/.ssh"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0700'
    state: directory
  when: bootstrap_ssh_dir.stat.exists

- name: Gather SSH files
  ansible.builtin.find:
    paths: "{{ user_home }}/.ssh"
    file_type: file
    recurse: false
  register: bootstrap_ssh_files
  when: bootstrap_ssh_dir.stat.exists

- name: Set SSH file permissions
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "{{ '0644' if item.path is search('\\.pub$') else '0600' }}"
  loop: "{{ bootstrap_ssh_files.files }}"
  when:
    - bootstrap_ssh_dir.stat.exists

- name: Check for gnupg directory
  ansible.builtin.stat:
    path: "{{ user_home }}/.gnupg"
  register: bootstrap_gnupg_dir

- name: Apply gnupg permissions when present
  ansible.builtin.file:
    path: "{{ user_home }}/.gnupg"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0700'
    state: directory
  when: bootstrap_gnupg_dir.stat.exists

- name: Check repository destination status
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop: "{{ repositories }}"
  register: repository_paths

- name: Check repository git metadata status
  ansible.builtin.stat:
    path: "{{ item.path }}/.git"
  loop: "{{ repositories }}"
  register: repository_git_metadata

- name: Ensure ownership for existing repositories
  ansible.builtin.file:
    path: "{{ item.item.path }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    recurse: true
  loop: "{{ repository_paths.results }}"
  when: item.stat.exists

- name: Remove non-git directories for cloneable repositories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ repositories }}"
  loop_control:
    index_var: repo_idx
  when:
    - item.clone_if_missing | default(true)
    - item.clone_from | default('') | length > 0
    - repository_paths.results[repo_idx].stat.exists | default(false)
    - not (repository_git_metadata.results[repo_idx].stat.exists | default(false))

- name: Refresh repository git metadata after cleanup
  ansible.builtin.stat:
    path: "{{ item.path }}/.git"
  loop: "{{ repositories }}"
  register: repository_git_metadata_after_cleanup

- name: Clone missing repositories from remote URLs
  ansible.builtin.git:
    repo: "{{ item.clone_from }}"
    dest: "{{ item.path }}"
    update: false
    depth: 1
    recursive: false
  loop: "{{ repositories }}"
  loop_control:
    index_var: repo_idx
  register: repository_clone_attempts
  become_user: "{{ user_name }}"
  failed_when: false
  environment:
    HOME: "{{ user_home }}"
    GIT_SSH_COMMAND: ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new
    GIT_TERMINAL_PROMPT: "0"
  when:
    - item.clone_if_missing | default(true)
    - item.clone_from | default('') | length > 0
    - not (repository_git_metadata_after_cleanup.results[repo_idx].stat.exists | default(false))

- name: Verify required repository clones
  ansible.builtin.stat:
    path: "{{ item.path }}/.git"
  loop: "{{ repositories }}"
  register: repository_git_metadata_after_clone

- name: Collect missing required repository clones
  ansible.builtin.set_fact:
    _missing_repository_clones: >-
      {{
        repository_git_metadata_after_clone.results
        | rejectattr('stat.exists')
        | selectattr('item.clone_if_missing', 'undefined')
        | map(attribute='item.name')
        | list
        +
        repository_git_metadata_after_clone.results
        | rejectattr('stat.exists')
        | selectattr('item.clone_if_missing', 'defined')
        | selectattr('item.clone_if_missing')
        | map(attribute='item.name')
        | list
      }}

- name: Fail when required repository clones are missing
  ansible.builtin.fail:
    msg: "Failed to clone required repositories: {{ _missing_repository_clones | join(', ') }}. Verify Git credentials and SSH keys."
  when:
    - _missing_repository_clones is defined
    - _missing_repository_clones | length > 0

- name: Probe local origin repositories for fallback clones
  ansible.builtin.command:
    cmd: "test -d {{ item.remotes.origin }}/.git"
  loop: "{{ repositories }}"
  register: repository_local_origin_probe
  changed_when: false
  failed_when: false
  when:
    - item.remotes is defined
    - item.remotes.origin is defined
    - item.remotes.origin is match('^/')

- name: Clone missing repositories from local origin paths
  ansible.builtin.shell:
    cmd: |
      set -e
      parent_dir="$(dirname "{{ item.item.path }}")"
      mkdir -p "$parent_dir"
      if [ ! -d "{{ item.item.path }}/.git" ]; then
        git clone --depth 1 "{{ item.item.remotes.origin }}" "{{ item.item.path }}"
      fi
  loop: "{{ repository_local_origin_probe.results | default([]) }}"
  register: repository_local_clone_attempts
  become_user: "{{ user_name }}"
  failed_when: false
  when:
    - item.rc is defined
    - item.rc == 0
    - item.item.clone_from | default('') | length == 0

- name: Collect local origin clone failures
  ansible.builtin.set_fact:
    _failed_local_repository_clones: >-
      {{
        repository_local_clone_attempts.results
        | selectattr('failed', 'defined')
        | selectattr('failed')
        | map(attribute='item.item.name')
        | list
      }}
  when: repository_local_clone_attempts is defined

- name: Fail when local origin clone fallback fails
  ansible.builtin.fail:
    msg: "Failed to clone local-origin repositories: {{ _failed_local_repository_clones | join(', ') }}."
  when:
    - _failed_local_repository_clones is defined
    - _failed_local_repository_clones | length > 0

- name: Refresh repository destination status
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop: "{{ repositories }}"
  register: repository_paths_after_clone

- name: Ensure origin remote for restored repositories
  ansible.builtin.shell:
    cmd: |
      if [ -d "{{ item.item.path }}/.git" ]; then
        cd "{{ item.item.path }}"
        if git remote get-url origin >/dev/null 2>&1; then
          git remote set-url origin "{{ item.item.remotes.origin }}"
        else
          git remote add origin "{{ item.item.remotes.origin }}"
        fi
      fi
  loop: "{{ repository_paths_after_clone.results }}"
  become_user: "{{ user_name }}"
  failed_when: false
  when:
    - item.stat.exists
    - item.item.remotes is defined
    - item.item.remotes.origin is defined

- name: Set upstream remote where known
  ansible.builtin.shell:
    cmd: |
      if [ -d "{{ item.item.path }}/.git" ]; then
        cd "{{ item.item.path }}"
        if git remote get-url upstream >/dev/null 2>&1; then
          git remote set-url upstream "{{ item.item.remotes.upstream }}"
        else
          git remote add upstream "{{ item.item.remotes.upstream }}"
        fi
      fi
  loop: "{{ repository_paths_after_clone.results }}"
  become_user: "{{ user_name }}"
  failed_when: false
  when:
    - item.stat.exists
    - item.item.remotes is defined
    - item.item.remotes.upstream is defined
