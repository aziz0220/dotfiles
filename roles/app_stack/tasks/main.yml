---
- name: Ensure package manager cache is fresh
  ansible.builtin.apt:
    update_cache: true

- name: Ensure runtime package prerequisites are installed
  ansible.builtin.apt:
    name:
      - curl
      - tar
      - unzip
      - zip
      - ca-certificates
      - git
    state: present
    install_recommends: false

- name: Write package list to temp file for batched probe
  ansible.builtin.copy:
    content: "{{ packages | unique | join('\n') }}\n"
    dest: /tmp/ansible-pkg-probe-list.txt
    mode: '0644'

- name: Resolve snapshot package install targets on target release (batched)
  ansible.builtin.shell: |
    set -euo pipefail
    while IFS= read -r pkg; do
      [ -z "$pkg" ] && continue
      candidate="$(apt-cache policy "$pkg" 2>/dev/null | awk '/Candidate:/ {c=$2} END {print c}')"
      if [ -n "$candidate" ] && [ "$candidate" != "(none)" ]; then
        echo "$pkg"
        continue
      fi
      if [[ "$pkg" != *t64 ]]; then
        t64_pkg="${pkg}t64"
        t64_candidate="$(apt-cache policy "$t64_pkg" 2>/dev/null | awk '/Candidate:/ {c=$2} END {print c}')"
        if [ -n "$t64_candidate" ] && [ "$t64_candidate" != "(none)" ]; then
          echo "$t64_pkg"
          continue
        fi
      fi
    done < /tmp/ansible-pkg-probe-list.txt
  args:
    executable: /bin/bash
  register: _package_probe
  changed_when: false

- name: Build installable package list
  ansible.builtin.set_fact:
    _available_packages: >-
      {{
        (_package_probe.stdout_lines | default([]))
        | reject('equalto', '')
        | list
        | unique
      }}

- name: Build unavailable package list
  ansible.builtin.set_fact:
    _missing_packages: >-
      {{
        (packages | unique)
        | difference(_available_packages)
      }}

- name: Exclude self-managed Ansible packages from package loop
  ansible.builtin.set_fact:
    _package_loop_exclusions:
      - ansible

- name: Build safe package install list
  ansible.builtin.set_fact:
    _available_packages_safe: "{{ _available_packages | difference(_package_loop_exclusions) }}"

- name: Show snapshot packages unavailable on this target release
  ansible.builtin.debug:
    msg: "Skipping unavailable packages: {{ _missing_packages | join(', ') }}"
  when: _missing_packages | length > 0

- name: Show package loop exclusions
  ansible.builtin.debug:
    msg: "Skipping self-managed packages during restore: {{ _package_loop_exclusions | join(', ') }}"
  when: _available_packages | difference(_available_packages_safe) | length > 0

- name: Install available snapshot packages in batches of 50 (conflict tolerant)
  ansible.builtin.shell: |
    DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends {{ item | join(' ') }}
  args:
    executable: /bin/bash
  loop: "{{ _available_packages_safe | batch(50) | list }}"
  register: _package_install_results
  failed_when: false
  when: _available_packages_safe | length > 0

- name: Collect packages from failed install batches
  ansible.builtin.set_fact:
    _failed_package_installs: >-
      {{
        _package_install_results.results
        | selectattr('failed', 'defined')
        | selectattr('failed')
        | map(attribute='item')
        | flatten
        | list
        | unique
      }}
  when: _package_install_results is defined

- name: Show packages skipped due install conflicts/errors
  ansible.builtin.debug:
    msg: "Skipping packages that failed to install cleanly: {{ _failed_package_installs | join(', ') }}"
  when:
    - _failed_package_installs is defined
    - _failed_package_installs | length > 0

- name: Check whether snap command is available
  ansible.builtin.command:
    cmd: which snap
  register: _snap_binary
  changed_when: false
  failed_when: false

- name: Read currently installed snap names
  ansible.builtin.shell: |
    snap list | awk 'NR>1 {print $1}' | sort -u
  args:
    executable: /bin/bash
  register: _installed_snaps_cmd
  changed_when: false
  when: _snap_binary.rc == 0

- name: Build currently installed snap set
  ansible.builtin.set_fact:
    _installed_snaps: "{{ _installed_snaps_cmd.stdout_lines | default([]) }}"
  when: _snap_binary.rc == 0

- name: Compute missing snap entries from desired list
  ansible.builtin.set_fact:
    _snaps_to_install: "{{ (snap_packages | default([], true)) | rejectattr('name', 'in', _installed_snaps | default([], true)) | list }}"
  when: _snap_binary.rc == 0

- name: Install missing snaps from desired list
  ansible.builtin.command:
    cmd: >-
      snap install {{ item.name }}
      {{ '--classic' if (item.classic | default(false)) else '' }}
      {{ ('--channel ' ~ item.channel) if (item.channel | default('') | length > 0) else '' }}
  loop: "{{ _snaps_to_install }}"
  register: _snap_install_results
  changed_when: true
  failed_when: false
  when:
    - _snap_binary.rc == 0
    - _snaps_to_install | length > 0

- name: Collect failed snap installs
  ansible.builtin.set_fact:
    _failed_snap_installs: >-
      {{
        _snap_install_results.results
        | selectattr('rc', 'defined')
        | rejectattr('rc', 'equalto', 0)
        | map(attribute='item.name')
        | list
      }}
  when: _snap_install_results is defined

- name: Fail when any required snap failed to install
  ansible.builtin.fail:
    msg: "Failed to install required snaps: {{ _failed_snap_installs | join(', ') }}"
  when:
    - _failed_snap_installs is defined
    - _failed_snap_installs | length > 0

- name: Ensure snapd service is enabled when available
  ansible.builtin.systemd:
    name: snapd
    enabled: true
    state: started
  failed_when: false
  when: _snap_binary.rc == 0

- name: Check aws snap binary path
  ansible.builtin.stat:
    path: /snap/bin/aws
  register: _aws_snap_binary
  when: _snap_binary.rc == 0

- name: Ensure aws command shim is on standard PATH
  ansible.builtin.file:
    src: /snap/bin/aws
    path: /usr/local/bin/aws
    state: link
    force: true
  when:
    - _snap_binary.rc == 0
    - _aws_snap_binary.stat.exists | default(false)

- name: Build local tool directories in home
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
  loop:
    - "{{ user_home }}/.npm-global"
    - "{{ user_home }}/.local"
    - "{{ user_home }}/go/bin"
  become_user: "{{ user_name }}"

- name: Check if nvm checkout already exists
  ansible.builtin.stat:
    path: "{{ user_home }}/.nvm/.git"
  register: _nvm_git_dir

- name: Restore nvm checkout if not present
  ansible.builtin.git:
    repo: https://github.com/nvm-sh/nvm.git
    dest: "{{ user_home }}/.nvm"
    depth: 1
    update: false
    recursive: false
  become_user: "{{ user_name }}"
  when: not _nvm_git_dir.stat.exists

- name: Check nvm bootstrap script
  ansible.builtin.stat:
    path: "{{ user_home }}/.nvm/nvm.sh"
  register: _nvm_script

- name: Fail when nvm bootstrap script is missing
  ansible.builtin.fail:
    msg: "Missing nvm bootstrap script at {{ user_home }}/.nvm/nvm.sh"
  when: not _nvm_script.stat.exists

- name: Install Node runtimes with nvm
  ansible.builtin.shell: |
    set -e
    export HOME="{{ user_home }}"
    export NVM_DIR="{{ user_home }}/.nvm"
    export NVM_NO_TEST=1
    . "$NVM_DIR/nvm.sh"
    nvm install "{{ item }}"
  args:
    executable: /bin/bash
  loop: "{{ node_versions }}"
  become_user: "{{ user_name }}"
  when: node_versions | length > 0

- name: Set default Node runtime
  ansible.builtin.shell: |
    set -e
    export HOME="{{ user_home }}"
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    . "{{ user_home }}/.nvm/nvm.sh"
    nvm alias default "{{ node_versions[0] }}"
  args:
    executable: /bin/bash
  become_user: "{{ user_name }}"
  when: node_versions | length > 0

- name: Install global npm CLI tools
  ansible.builtin.shell: |
    set -e
    export HOME="{{ user_home }}"
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    nvm use default >/dev/null
    npm install -g "{{ item }}"
  args:
    executable: /bin/bash
  loop: "{{ npm_global_packages | default([], true) }}"
  become_user: "{{ user_name }}"
  when: (npm_global_packages | default([], true)) | length > 0

- name: Check whether pipx is available
  ansible.builtin.command:
    cmd: which pipx
  register: _pipx_binary
  changed_when: false
  failed_when: false

- name: Read currently installed pipx packages
  ansible.builtin.shell: |
    set -euo pipefail
    pipx list --json 2>/dev/null | python3 -c 'import json,sys; data=json.load(sys.stdin); print("\n".join(sorted(data.get("venvs", {}).keys())))'
  args:
    executable: /bin/bash
  register: _installed_pipx_cmd
  changed_when: false
  failed_when: false
  when: _pipx_binary.rc == 0

- name: Build installed pipx package set
  ansible.builtin.set_fact:
    _installed_pipx_packages: "{{ _installed_pipx_cmd.stdout_lines | default([]) }}"
  when: _pipx_binary.rc == 0

- name: Compute missing pipx packages
  ansible.builtin.set_fact:
    _pipx_to_install: "{{ (pipx_packages | default([], true)) | difference(_installed_pipx_packages | default([], true)) }}"
  when: _pipx_binary.rc == 0

- name: Install missing pipx packages
  ansible.builtin.command:
    cmd: "pipx install {{ item }}"
  loop: "{{ _pipx_to_install }}"
  register: _pipx_install_results
  changed_when: true
  failed_when: false
  become_user: "{{ user_name }}"
  when:
    - _pipx_binary.rc == 0
    - _pipx_to_install | length > 0

- name: Collect failed pipx installs
  ansible.builtin.set_fact:
    _failed_pipx_installs: >-
      {{
        _pipx_install_results.results
        | selectattr('rc', 'defined')
        | rejectattr('rc', 'equalto', 0)
        | map(attribute='item')
        | list
      }}
  when:
    - _pipx_install_results is defined
    - _pipx_install_results.results is defined

- name: Fail when any required pipx package failed to install
  ansible.builtin.fail:
    msg: "Failed to install required pipx packages: {{ _failed_pipx_installs | join(', ') }}"
  when:
    - _failed_pipx_installs is defined
    - _failed_pipx_installs | length > 0

- name: Check whether cargo is available
  ansible.builtin.command:
    cmd: which cargo
  register: _cargo_binary
  changed_when: false
  failed_when: false

- name: Read currently installed cargo packages
  ansible.builtin.shell: |
    set -euo pipefail
    cargo install --list 2>/dev/null | awk -F' v' '/^[A-Za-z0-9._-]+ v[0-9]/ {print $1}' | sort -u
  args:
    executable: /bin/bash
  register: _installed_cargo_cmd
  changed_when: false
  failed_when: false
  become_user: "{{ user_name }}"
  when: _cargo_binary.rc == 0

- name: Build installed cargo package set
  ansible.builtin.set_fact:
    _installed_cargo_packages: "{{ _installed_cargo_cmd.stdout_lines | default([]) }}"
  when: _cargo_binary.rc == 0

- name: Compute missing cargo packages
  ansible.builtin.set_fact:
    _cargo_to_install: "{{ (cargo_packages | default([], true)) | difference(_installed_cargo_packages | default([], true)) }}"
  when: _cargo_binary.rc == 0

- name: Install missing cargo packages
  ansible.builtin.command:
    cmd: "cargo install {{ item }}"
  loop: "{{ _cargo_to_install }}"
  register: _cargo_install_results
  changed_when: true
  failed_when: false
  become_user: "{{ user_name }}"
  when:
    - _cargo_binary.rc == 0
    - _cargo_to_install | length > 0

- name: Collect failed cargo installs
  ansible.builtin.set_fact:
    _failed_cargo_installs: >-
      {{
        _cargo_install_results.results
        | selectattr('rc', 'defined')
        | rejectattr('rc', 'equalto', 0)
        | map(attribute='item')
        | list
      }}
  when:
    - _cargo_install_results is defined
    - _cargo_install_results.results is defined

- name: Fail when any required cargo package failed to install
  ansible.builtin.fail:
    msg: "Failed to install required cargo packages: {{ _failed_cargo_installs | join(', ') }}"
  when:
    - _failed_cargo_installs is defined
    - _failed_cargo_installs | length > 0

- name: Check whether gem is available
  ansible.builtin.command:
    cmd: which gem
  register: _gem_binary
  changed_when: false
  failed_when: false

- name: Read currently installed gem packages
  ansible.builtin.shell: |
    set -euo pipefail
    ruby -e 'require "rubygems"; u=Gem.user_dir; puts Gem::Specification.select { |s| s.base_dir.start_with?(u) }.map(&:name).uniq.sort'
  args:
    executable: /bin/bash
  register: _installed_gem_cmd
  changed_when: false
  failed_when: false
  become_user: "{{ user_name }}"
  when: _gem_binary.rc == 0

- name: Build installed gem package set
  ansible.builtin.set_fact:
    _installed_gem_packages: "{{ _installed_gem_cmd.stdout_lines | default([]) }}"
  when: _gem_binary.rc == 0

- name: Compute missing gem packages
  ansible.builtin.set_fact:
    _gem_to_install: "{{ (gem_packages | default([], true)) | difference(_installed_gem_packages | default([], true)) }}"
  when: _gem_binary.rc == 0

- name: Install missing gem packages
  ansible.builtin.command:
    cmd: "gem install --user-install --no-document {{ item }}"
  loop: "{{ _gem_to_install }}"
  register: _gem_install_results
  changed_when: true
  failed_when: false
  become_user: "{{ user_name }}"
  when:
    - _gem_binary.rc == 0
    - _gem_to_install | length > 0

- name: Collect failed gem installs
  ansible.builtin.set_fact:
    _failed_gem_installs: >-
      {{
        _gem_install_results.results
        | selectattr('rc', 'defined')
        | rejectattr('rc', 'equalto', 0)
        | map(attribute='item')
        | list
      }}
  when:
    - _gem_install_results is defined
    - _gem_install_results.results is defined

- name: Fail when any required gem package failed to install
  ansible.builtin.fail:
    msg: "Failed to install required gem packages: {{ _failed_gem_installs | join(', ') }}"
  when:
    - _failed_gem_installs is defined
    - _failed_gem_installs | length > 0

- name: Check whether flatpak is available
  ansible.builtin.command:
    cmd: which flatpak
  register: _flatpak_binary
  changed_when: false
  failed_when: false

- name: Read currently installed flatpak app ids
  ansible.builtin.shell: |
    set -euo pipefail
    flatpak list --app --columns=application 2>/dev/null | sed '/^$/d' | sort -u
  args:
    executable: /bin/bash
  register: _installed_flatpak_cmd
  changed_when: false
  failed_when: false
  when: _flatpak_binary.rc == 0

- name: Build installed flatpak app set
  ansible.builtin.set_fact:
    _installed_flatpak_apps: "{{ _installed_flatpak_cmd.stdout_lines | default([]) }}"
  when: _flatpak_binary.rc == 0

- name: Compute missing flatpak apps
  ansible.builtin.set_fact:
    _flatpak_to_install: "{{ (flatpak_apps | default([], true)) | rejectattr('id', 'in', _installed_flatpak_apps | default([], true)) | list }}"
  when: _flatpak_binary.rc == 0

- name: Install missing flatpak apps
  ansible.builtin.command:
    cmd: "flatpak install -y {{ item.remote | default('flathub') }} {{ item.id }}"
  loop: "{{ _flatpak_to_install }}"
  register: _flatpak_install_results
  changed_when: true
  failed_when: false
  when:
    - _flatpak_binary.rc == 0
    - _flatpak_to_install | length > 0

- name: Collect failed flatpak installs
  ansible.builtin.set_fact:
    _failed_flatpak_installs: >-
      {{
        _flatpak_install_results.results
        | selectattr('rc', 'defined')
        | rejectattr('rc', 'equalto', 0)
        | map(attribute='item.id')
        | list
      }}
  when:
    - _flatpak_install_results is defined
    - _flatpak_install_results.results is defined

- name: Fail when any required flatpak app failed to install
  ansible.builtin.fail:
    msg: "Failed to install required flatpak apps: {{ _failed_flatpak_installs | join(', ') }}"
  when:
    - _failed_flatpak_installs is defined
    - _failed_flatpak_installs | length > 0

- name: Probe custom tools presence
  ansible.builtin.shell: "{{ item.check_cmd }}"
  args:
    executable: /bin/bash
  loop: "{{ custom_tools | default([], true) }}"
  register: _custom_tool_probes
  changed_when: false
  failed_when: false

- name: Install missing custom tools
  ansible.builtin.shell: "{{ item.item.install_cmd }}"
  args:
    executable: /bin/bash
  loop: "{{ _custom_tool_probes.results | default([]) }}"
  register: _custom_tool_installs
  changed_when: true
  failed_when: false
  become: "{{ item.item.become | default(false) }}"
  become_user: "{{ item.item.become_user | default(omit) }}"
  when:
    - item.rc is defined
    - item.rc != 0

- name: Collect failed custom tool installs
  ansible.builtin.set_fact:
    _failed_custom_tool_installs: >-
      {{
        _custom_tool_installs.results
        | selectattr('rc', 'defined')
        | rejectattr('rc', 'equalto', 0)
        | map(attribute='item.item.name')
        | list
      }}
  when:
    - _custom_tool_installs is defined
    - _custom_tool_installs.results is defined

- name: Show custom tools that failed to install (non-fatal)
  ansible.builtin.debug:
    msg: "Custom tools that failed to install (install manually): {{ _failed_custom_tool_installs | join(', ') }}"
  when:
    - _failed_custom_tool_installs is defined
    - _failed_custom_tool_installs | length > 0

- name: Check if jenv checkout already exists
  ansible.builtin.stat:
    path: "{{ user_home }}/.jenv/.git"
  register: _jenv_git_dir

- name: Restore jenv checkout if not present
  ansible.builtin.git:
    repo: https://github.com/jenv/jenv.git
    dest: "{{ user_home }}/.jenv"
    depth: 1
    update: false
    recursive: false
  become_user: "{{ user_name }}"
  when: not _jenv_git_dir.stat.exists

- name: Install SDKMAN
  ansible.builtin.shell: |
    curl -s "https://get.sdkman.io" | bash
  args:
    executable: /bin/bash
    creates: "{{ user_home }}/.sdkman/bin/sdkman-init.sh"
  become_user: "{{ user_name }}"

- name: Check SDKMAN bootstrap script
  ansible.builtin.stat:
    path: "{{ user_home }}/.sdkman/bin/sdkman-init.sh"
  register: _sdkman_script

- name: Fail when SDKMAN bootstrap script is missing
  ansible.builtin.fail:
    msg: "Missing SDKMAN bootstrap script at {{ user_home }}/.sdkman/bin/sdkman-init.sh"
  when: not _sdkman_script.stat.exists

- name: Install SDKMAN Java versions
  ansible.builtin.shell: |
    set -e
    source "{{ user_home }}/.sdkman/bin/sdkman-init.sh"
    sdk install java "{{ item }}"
  args:
    executable: /bin/bash
    creates: "{{ user_home }}/.sdkman/candidates/java/{{ item }}"
  loop: "{{ sdkman_java_versions }}"
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"
    SDKMAN_DIR: "{{ user_home }}/.sdkman"
    SDKMAN_AUTO_ANSWER: "true"

- name: Set default SDKMAN Java version
  ansible.builtin.shell: |
    set -e
    source "{{ user_home }}/.sdkman/bin/sdkman-init.sh"
    sdk default java "{{ sdkman_default_java }}"
  args:
    executable: /bin/bash
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"
    SDKMAN_DIR: "{{ user_home }}/.sdkman"
    SDKMAN_AUTO_ANSWER: "true"
  when: sdkman_java_versions | length > 0

- name: Install SDKMAN Maven versions
  ansible.builtin.shell: |
    set -e
    source "{{ user_home }}/.sdkman/bin/sdkman-init.sh"
    sdk install maven "{{ item }}"
  args:
    executable: /bin/bash
    creates: "{{ user_home }}/.sdkman/candidates/maven/{{ item }}"
  loop: "{{ sdkman_maven_versions }}"
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"
    SDKMAN_DIR: "{{ user_home }}/.sdkman"
    SDKMAN_AUTO_ANSWER: "true"

- name: Set default SDKMAN Maven version
  ansible.builtin.shell: |
    set -e
    source "{{ user_home }}/.sdkman/bin/sdkman-init.sh"
    sdk default maven "{{ sdkman_default_maven }}"
  args:
    executable: /bin/bash
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"
    SDKMAN_DIR: "{{ user_home }}/.sdkman"
    SDKMAN_AUTO_ANSWER: "true"
  when: sdkman_maven_versions | length > 0

- name: Install SDKMAN Gradle versions
  ansible.builtin.shell: |
    set -e
    source "{{ user_home }}/.sdkman/bin/sdkman-init.sh"
    sdk install gradle "{{ item }}"
  args:
    executable: /bin/bash
    creates: "{{ user_home }}/.sdkman/candidates/gradle/{{ item }}"
  loop: "{{ sdkman_gradle_versions }}"
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"
    SDKMAN_DIR: "{{ user_home }}/.sdkman"
    SDKMAN_AUTO_ANSWER: "true"

- name: Set default SDKMAN Gradle version
  ansible.builtin.shell: |
    set -e
    source "{{ user_home }}/.sdkman/bin/sdkman-init.sh"
    sdk default gradle "{{ sdkman_default_gradle }}"
  args:
    executable: /bin/bash
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"
    SDKMAN_DIR: "{{ user_home }}/.sdkman"
    SDKMAN_AUTO_ANSWER: "true"
  when: sdkman_gradle_versions | length > 0
