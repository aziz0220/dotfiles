---
- name: Ensure apt source lists directory exists
  ansible.builtin.file:
    path: /etc/apt/sources.list.d
    state: directory
    mode: '0755'

- name: Read captured apt sources snapshot
  ansible.builtin.set_fact:
    _snapshot_sources_content: "{{ lookup('ansible.builtin.file', role_path + '/files/etc_apt_sources.list', errors='ignore') | default('', true) }}"

- name: Check whether snapshot apt sources match target release
  ansible.builtin.set_fact:
    _snapshot_sources_matches_release: "{{ _snapshot_sources_content is search('(?m)^deb\\s+\\S+\\s+' ~ ansible_distribution_release ~ '(?:\\s|-)') }}"

- name: Check if deb822 ubuntu.sources exists on target
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/ubuntu.sources
  register: _ubuntu_deb822_sources

- name: Show apt source release mismatch
  ansible.builtin.debug:
    msg: >-
      Skipping captured /etc/apt/sources.list because it does not match target release
      (target={{ ansible_distribution_release }}). Using target release sources instead.
  when:
    - _snapshot_sources_content | length > 0
    - not _snapshot_sources_matches_release

- name: Restore /etc/apt/sources.list when snapshot matches target release
  ansible.builtin.copy:
    src: etc_apt_sources.list
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: '0644'
  when: _snapshot_sources_matches_release

- name: Prefer deb822 sources file when release mismatches and deb822 is available
  ansible.builtin.copy:
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible.
      # Repositories are configured in /etc/apt/sources.list.d/ubuntu.sources.
  when:
    - not _snapshot_sources_matches_release
    - _ubuntu_deb822_sources.stat.exists

- name: Render distro-aware /etc/apt/sources.list when deb822 sources are unavailable
  ansible.builtin.template:
    src: etc_apt_sources.list.j2
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: '0644'
  when:
    - not _snapshot_sources_matches_release
    - not _ubuntu_deb822_sources.stat.exists

- name: Restore HashiCorp repo list with target distro codename
  ansible.builtin.template:
    src: etc_apt_sources_hashicorp.list.j2
    dest: /etc/apt/sources.list.d/hashicorp.list
    owner: root
    group: root
    mode: '0644'

- name: Restore HashiCorp apt keyring
  ansible.builtin.copy:
    src: usr_share_keyrings/hashicorp-archive-keyring.gpg
    dest: /usr/share/keyrings/hashicorp-archive-keyring.gpg
    owner: root
    group: root
    mode: '0644'

- name: Restore WSL configuration
  ansible.builtin.copy:
    src: etc_wsl.conf
    dest: /etc/wsl.conf
    owner: root
    group: root
    mode: '0644'

- name: Ensure common system directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /etc/apt/keyrings

- name: Write default locale
  ansible.builtin.copy:
    dest: /etc/default/locale
    owner: root
    group: root
    mode: '0644'
    content: |
      LANG={{ locale_name }}

- name: Write /etc/timezone
  ansible.builtin.copy:
    dest: /etc/timezone
    owner: root
    group: root
    mode: '0644'
    content: |
      {{ timezone }}

- name: Sync timezone file and locale generation database
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ timezone }}"
    path: /etc/localtime
    state: link
    force: true
  notify: refresh-timezone

- name: Run apt update after sources are restored
  ansible.builtin.apt:
    update_cache: true

- name: Gather available services on target
  ansible.builtin.service_facts:

- name: Resolve snapshot services available on target
  ansible.builtin.set_fact:
    _available_systemd_services: "{{ systemd_services | select('in', ansible_facts.services.keys() | list) | list }}"

- name: Resolve snapshot services missing on target
  ansible.builtin.set_fact:
    _missing_systemd_services: "{{ systemd_services | difference(_available_systemd_services) }}"

- name: Show services missing on target (skipped)
  ansible.builtin.debug:
    msg: "Skipping unavailable services: {{ _missing_systemd_services | join(', ') }}"
  when: _missing_systemd_services | length > 0

- name: Ensure available snapshot services are enabled
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ _available_systemd_services }}"
  register: _service_enable_results
  failed_when: false

- name: Collect service enable failures
  ansible.builtin.set_fact:
    _service_enable_failures: >-
      {{
        _service_enable_results.results
        | selectattr('failed', 'defined')
        | selectattr('failed')
        | map(attribute='item')
        | list
      }}
  when: _service_enable_results is defined

- name: Show service enable failures
  ansible.builtin.debug:
    msg: "Services present but not enabled/started: {{ _service_enable_failures | join(', ') }}"
  when:
    - _service_enable_failures is defined
    - _service_enable_failures | length > 0
