name: CI

on:
  push:
    branches: [ci-cd-setup, main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck ansible
          pip install yamllint ansible-lint

      - name: YAML lint
        run: yamllint --strict .

      - name: Shellcheck
        run: shellcheck scripts/*.sh install

      - name: Ansible syntax check
        run: ansible-playbook --syntax-check -i inventory.ini local.yml

      - name: Ansible lint
        run: ansible-lint local.yml

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML vars
        run: |
          errors=0
          for f in vars/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null || { echo "INVALID: $f"; errors=$((errors+1)); continue; }
            echo "OK: $f"
          done
          exit $errors

      - name: Check required files
        run: |
          for f in site.yml local.yml inventory.ini ansible.cfg ansible-run install; do
            test -f "$f" && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done
          for role in system_setup home_restore app_stack; do
            test -f "roles/$role/tasks/main.yml" && echo "OK" || { echo "MISSING: roles/$role/tasks/main.yml"; exit 1; }
          done

      - name: Bootstrap home gitignored
        run: |
          if git ls-files --error-unmatch .bootstrap/home/ 2>/dev/null; then
            echo "FAIL: .bootstrap/home/ is tracked"
            exit 1
          fi
          echo "OK: .bootstrap/home/ is gitignored"

      - name: Vault is AES256 encrypted
        run: |
          if file vault/home-secrets.tar.gz.aes256 | grep -q 'data'; then
            echo "OK: vault present"
          else
            echo "MISSING: vault/home-secrets.tar.gz.aes256"
            exit 1
          fi

  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for tracked credentials
        run: |
          errors=0
          for pattern in '*id_rsa*' '*id_ed25519*' '*.pem' '*credentials*'; do
            for f in $(git ls-files -- "$pattern" 2>/dev/null); do
              echo "WARNING: Potential credential: $f"
              errors=$((errors+1))
            done
          done
          # Check for secret files (exclude vault)
          for f in $(git ls-files -- '*secret*' 2>/dev/null); do
            case "$f" in
              vault/*) echo "SKIP (encrypted vault): $f" ;;
              *) echo "WARNING: Potential credential: $f"; errors=$((errors+1)) ;;
            esac
          done
          exit $errors

  integration:
    name: Integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible git curl tar unzip ca-certificates

      - name: Create test user
        run: |
          sudo useradd -m -s /bin/bash -u 2000 testuser
          echo 'testuser ALL=(ALL) NOPASSWD: ALL' | sudo tee /etc/sudoers.d/testuser

      - name: Prepare workspace and ansible temp
        run: |
          chmod a+rx "$GITHUB_WORKSPACE"
          chmod -R a+rX "$GITHUB_WORKSPACE"
          sudo mkdir -p /home/testuser/.ansible/tmp
          sudo chmod 777 /home/testuser/.ansible /home/testuser/.ansible/tmp

      - name: Install packages
        env:
          HOME: /home/testuser
        run: >
          ansible-playbook local.yml
          -i inventory.ini
          -e "user_name=testuser"
          -e "user_home=/home/testuser"
          -e "user_uid=2000"
          -e "user_gid=2000"
          -e "user_shell=/bin/bash"
          --tags software
