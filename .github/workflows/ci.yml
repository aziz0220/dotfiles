name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck ansible
          pip install yamllint ansible-lint

      - name: YAML lint
        run: yamllint --strict .

      - name: Shellcheck
        run: shellcheck scripts/*.sh install

      - name: Ansible syntax check
        run: ansible-playbook --syntax-check -i inventory.ini local.yml

      - name: Ansible lint
        run: ansible-lint local.yml

  validate-vars:
    name: Validate vars
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML structure
        run: |
          errors=0
          for f in vars/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null || {
              echo "INVALID: $f"
              errors=$((errors+1))
              continue
            }
            echo "OK: $f"
          done
          exit $errors

      - name: Check required vars files
        run: |
          for f in user-profile system-locale installed-packages systemd-enabled-services \
                   snap-list groups runtimes npm-global pipx cargo gem flatpak custom-tools repos; do
            test -f "vars/$f.yml" && echo "OK: vars/$f.yml" || { echo "MISSING: vars/$f.yml"; exit 1; }
          done

  validate-structure:
    name: Validate structure
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          for f in site.yml local.yml inventory.ini ansible.cfg ansible-run install; do
            test -f "$f" && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done

      - name: Check roles have tasks
        run: |
          for role in system_setup home_restore app_stack; do
            test -f "roles/$role/tasks/main.yml" && echo "OK: roles/$role/tasks/main.yml" \
              || { echo "MISSING: roles/$role/tasks/main.yml"; exit 1; }
          done

      - name: Encrypted vault exists
        run: |
          test -f vault/home-secrets.tar.gz.aes256 && echo "OK: vault present" \
            || { echo "MISSING: vault/home-secrets.tar.gz.aes256"; exit 1; }

      - name: Bootstrap home is gitignored
        run: |
          if git ls-files --error-unmatch .bootstrap/home/ 2>/dev/null; then
            echo "FAIL: .bootstrap/home/ is tracked by git!"
            exit 1
          fi
          echo "OK: .bootstrap/home/ is properly gitignored"

  security-scan:
    name: Secret scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for accidental credential files
        run: |
          errors=0
          for pattern in '*id_rsa*' '*id_ed25519*' '*.pem' '*credentials*' '*secret*' '*.key'; do
            for f in $(git ls-files -- "$pattern" 2>/dev/null); do
              echo "WARNING: Potential credential file tracked: $f"
              errors=$((errors+1))
            done
          done
          exit $errors

      - name: Scan git history for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
