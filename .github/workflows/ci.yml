name: CI
on:
  push:
    branches: [ci-cd-setup]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible git curl tar unzip ca-certificates
      - name: Create test user
        run: |
          sudo useradd -m -s /bin/bash -u 2000 testuser
          echo 'testuser ALL=(ALL) NOPASSWD: ALL' | sudo tee /etc/sudoers.d/testuser
      - name: Prepare workspace and ansible temp
        run: |
          chmod a+rx "$GITHUB_WORKSPACE"
          chmod -R a+rX "$GITHUB_WORKSPACE"
          sudo mkdir -p /home/testuser/.ansible/tmp
          sudo chmod 777 /home/testuser/.ansible /home/testuser/.ansible/tmp
      - name: Install packages
        env:
          HOME: /home/testuser
        run: >
          ansible-playbook local.yml
          -i inventory.ini
          -e "user_name=testuser"
          -e "user_home=/home/testuser"
          -e "user_uid=2000"
          -e "user_gid=2000"
          -e "user_shell=/bin/bash"
          --tags software
      - name: Verify
        run: |
          echo "=== Git ==="; git --version
          echo "=== Curl ==="; curl --version | head -1
          echo "=== Node ==="; sudo -u testuser bash -c 'source ~/.nvm/nvm.sh && node --version' || echo "NVM not installed"
