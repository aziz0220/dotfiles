name: CI
on:
  push:
    branches: [ci-cd-setup]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible git curl tar unzip ca-certificates
      - name: Create test user
        run: |
          sudo useradd -m -s /bin/bash -u 2000 testuser
          echo 'testuser ALL=(ALL) NOPASSWD: ALL' | sudo tee /etc/sudoers.d/testuser
      - name: Create minimal bootstrap home
        run: |
          mkdir -p .bootstrap/home/.ssh
          touch .bootstrap/home/.ssh/authorized_keys
          echo "test" | sudo tee .bootstrap/home/.zshrc
          echo "test" | sudo tee .bootstrap/home/.gitconfig
          sudo chown -R testuser:testuser .bootstrap/home/
      - name: Decrypt vault for full test
        run: |
          if [ -n "$SETUP_SECRETS_PASSWORD" ] && [ -f scripts/decrypt_home_bundle.sh ]; then
            sudo rm -rf .bootstrap/home
            bash scripts/decrypt_home_bundle.sh vault/home-secrets.tar.gz.aes256 .bootstrap/home SETUP_SECRETS_PASSWORD
          else
            echo "Secret not set or decrypt script not found, using minimal bootstrap"
          fi
        env:
          SETUP_SECRETS_PASSWORD: ${{ secrets.SETUP_SECRETS_PASSWORD }}
      - name: Ansible dry-check
        run: >
          sudo -u testuser bash -c 'cd "$0" && ansible-playbook local.yml --check
          -i inventory.ini
          -e "user_name=testuser"
          -e "user_home=/home/testuser"
          -e "user_uid=2000"
          -e "user_gid=2000"
          -e "user_shell=/bin/bash"
          --tags core,software' "$PWD"
      - name: Install packages
        run: >
          sudo -u testuser bash -c 'cd "$0" && ansible-playbook local.yml
          -i inventory.ini
          -e "user_name=testuser"
          -e "user_home=/home/testuser"
          -e "user_uid=2000"
          -e "user_gid=2000"
          -e "user_shell=/bin/bash"
          --tags software' "$PWD"
      - name: Verify
        run: |
          echo "=== Git ==="; git --version
          echo "=== Curl ==="; curl --version | head -1
          echo "=== Node ==="; sudo -u testuser bash -c 'source ~/.nvm/nvm.sh && node --version' || echo "NVM not installed"
