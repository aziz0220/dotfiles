name: CI
on:
  push:
    branches: [ci-cd-setup, main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck ansible
          pip install yamllint ansible-lint
      - name: YAML lint
        run: yamllint --strict .
      - name: Shellcheck
        run: shellcheck scripts/*.sh install
      - name: Ansible syntax check
        run: ansible-playbook --syntax-check -i inventory.ini local.yml
      - name: Ansible lint
        run: ansible-lint local.yml
