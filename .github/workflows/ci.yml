name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck ansible

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        run: pip install yamllint ansible-lint

      - name: YAML lint
        run: yamllint --strict .

      - name: Shellcheck
        run: shellcheck scripts/*.sh install ansible-run bin/dotfiles

      - name: Ansible syntax check
        run: ansible-playbook --syntax-check -i inventory.ini local.yml

      - name: Ansible lint
        run: ansible-lint local.yml

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML vars
        run: |
          errors=0
          for f in vars/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null \
              && echo "OK: $f" \
              || { echo "INVALID: $f"; errors=$((errors+1)); }
          done
          exit $errors

      - name: Check required files
        run: |
          for f in site.yml local.yml inventory.ini ansible.cfg ansible-run install Makefile bin/dotfiles; do
            test -f "$f" && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done
          for role in system_setup home_restore app_stack; do
            test -f "roles/$role/tasks/main.yml" && echo "OK: roles/$role/tasks/main.yml" \
              || { echo "MISSING: roles/$role/tasks/main.yml"; exit 1; }
          done

      - name: Bootstrap home is gitignored
        run: |
          if git ls-files --error-unmatch .bootstrap/home/ 2>/dev/null; then
            echo "FAIL: .bootstrap/home/ is tracked"
            exit 1
          fi
          echo "OK: .bootstrap/home/ is gitignored"

      - name: Vault is present
        run: |
          if file vault/home-secrets.tar.gz.aes256 | grep -q 'data'; then
            echo "OK: vault/home-secrets.tar.gz.aes256"
          else
            echo "MISSING: vault/home-secrets.tar.gz.aes256"
            exit 1
          fi

  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for tracked credentials
        run: |
          errors=0
          for pattern in '*id_rsa*' '*id_ed25519*' '*.pem' '*credentials*'; do
            for f in $(git ls-files -- "$pattern" 2>/dev/null); do
              echo "WARNING: Potential credential: $f"
              errors=$((errors+1))
            done
          done
          for f in $(git ls-files -- '*secret*' 2>/dev/null); do
            case "$f" in
              vault/*) echo "SKIP (encrypted vault): $f" ;;
              *) echo "WARNING: Potential credential: $f"; errors=$((errors+1)) ;;
            esac
          done
          exit $errors

  provision:
    name: Full provision (${{ matrix.distro }})
    runs-on: ${{ matrix.distro }}
    needs: [lint, validate, security]
    strategy:
      matrix:
        distro: [ubuntu-22.04, ubuntu-24.04]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ansible git curl tar unzip ca-certificates openssl

      - name: Create test user
        run: |
          sudo useradd -m -s /bin/bash -u 2000 testuser
          echo 'testuser ALL=(ALL) NOPASSWD: ALL' | sudo tee /etc/sudoers.d/testuser

      - name: Setup home skeleton
        run: |
          mkdir -p .bootstrap/home/.ssh
          touch .bootstrap/home/.ssh/authorized_keys
          echo "test" > .bootstrap/home/.zshrc
          echo "test" > .bootstrap/home/.gitconfig

      - name: Decrypt vault
        env:
          SETUP_SECRETS_PASSWORD: ${{ secrets.SETUP_SECRETS_PASSWORD }}
        run: |
          if [ -f scripts/decrypt_home_bundle.sh ]; then
            bash scripts/decrypt_home_bundle.sh vault/home-secrets.tar.gz.aes256 .bootstrap/home SETUP_SECRETS_PASSWORD
            echo "Vault decrypted"
          else
            echo "No decrypt script found, using skeleton"
          fi

      - name: Prepare ansible tmp dir
        run: |
          sudo mkdir -p /home/testuser/.ansible/tmp
          sudo chmod 777 /home/testuser/.ansible /home/testuser/.ansible/tmp
          chmod a+rx "$GITHUB_WORKSPACE"
          chmod -R a+rX "$GITHUB_WORKSPACE"

      - name: Run full playbook
        env:
          HOME: /home/testuser
        run: >
          ansible-playbook local.yml
          -i inventory.ini
          -e "user_name=testuser"
          -e "user_home=/home/testuser"
          -e "user_uid=2000"
          -e "user_gid=2000"
          -e "user_shell=/bin/bash"

      - name: Verify installed components
        run: |
          set -x
          echo "=== System ==="
          cat /etc/os-release | head -2
          uname -r
          echo "=== Shell ==="
          sudo -u testuser zsh --version || echo "zsh not installed"
          echo "=== Git ==="
          git --version
          echo "=== Curl ==="
          curl --version | head -1
          echo "=== Node ==="
          sudo -u testuser bash -c 'export HOME=/home/testuser && source ~/.nvm/nvm.sh && node --version && npm --version' || echo "Node not installed"
          echo "=== Neovim ==="
          sudo -u testuser nvim --version | head -1 || echo "nvim not installed"
          echo "=== Tmux ==="
          tmux -V || echo "tmux not installed"
          echo "=== GitHub CLI ==="
          gh --version | head -1 || echo "gh not installed"
          echo "=== Custom tools ==="
          for t in claude opencode kind; do
            echo -n "$t: "
            sudo -u testuser bash -c "command -v $t" || echo "(not installed)"
          done
          echo "=== Dotfiles ==="
          ls -la /home/testuser/ 2>/dev/null | head -10
